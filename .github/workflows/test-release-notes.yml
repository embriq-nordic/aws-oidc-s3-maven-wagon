name: Test release notes generation

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Proposed tag name (does not have to exist; nothing is pushed)"
        required: false
        default: "v0.0.0-test"
      previous_tag_name:
        description: "Optional previous tag; if empty, GitHub uses the last published release"
        required: false
      target_sha:
        description: "Optional commit SHA. Empty = use current HEAD of this checkout."
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Call generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name }}
          PREVIOUS_TAG_NAME: ${{ inputs.previous_tag_name }}
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          if [ -z "${TARGET_SHA}" ]; then
            TARGET_SHA=$(git rev-parse HEAD)
          fi
          echo "::group::Inputs"
          echo "repo=${GITHUB_REPOSITORY}"
          echo "tag_name=${TAG_NAME}"
          echo "target_commitish=${TARGET_SHA}"
          echo "previous_tag_name=${PREVIOUS_TAG_NAME:-<default: last published release>}"
          echo "::endgroup::"

          args=(
            --method POST
            -H "Accept: application/vnd.github+json"
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes"
            -f "tag_name=${TAG_NAME}"
            -f "target_commitish=${TARGET_SHA}"
          )
          if [ -n "${PREVIOUS_TAG_NAME}" ]; then
            args+=( -f "previous_tag_name=${PREVIOUS_TAG_NAME}" )
          fi

          echo "::group::API call"
          if ! gh api "${args[@]}" > /tmp/release-notes.json 2> /tmp/gh-stderr.log; then
            echo "gh api failed. stderr:"
            cat /tmp/gh-stderr.log
            echo "stdout:"
            cat /tmp/release-notes.json
            exit 1
          fi
          echo "Raw API response:"
          cat /tmp/release-notes.json
          echo
          echo "::endgroup::"

          NOTES=$(jq -r '.body // empty' < /tmp/release-notes.json)
          echo "::group::Extracted notes (${#NOTES} chars)"
          echo "${NOTES}"
          echo "::endgroup::"
