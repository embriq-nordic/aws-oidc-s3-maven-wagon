name: Publish to Maven Central

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'adopt'

      # If you're using GPG signing, set up GPG.
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6.2.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: maven-settings-xml-action
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          servers: '[{ "id": "central", "username": "${{ secrets.MAVEN_CENTRAL_USER }}", "password": "${{ secrets.MAVEN_CENTRAL_PASSWORD }}" }]'

      - name: Set Git user
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Release to Nexus Maven Central
        run: |
          ./mvnw versions:set -DremoveSnapshot=true
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout 2> /dev/null)
          ./scripts/update-readme-version.sh "${VERSION}"
          git commit -am "Prepare for release of ${VERSION}"
          ./mvnw deploy \
            -P release \
            -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}
          NOTES=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="v${VERSION}" \
            -f target_commitish="$(git rev-parse HEAD)" \
            --jq .body)
          printf 'Release v%s\n\n%s\n' "${VERSION}" "${NOTES}" | git tag -a "v${VERSION}" -F -
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" --notes "${NOTES}" --title "v${VERSION}"
          ./mvnw versions:set -DnextSnapshot=true
          git commit -am "Update to next snapshot version"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
